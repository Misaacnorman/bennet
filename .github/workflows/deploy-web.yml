# Builds Flutter web and deploys to Firebase Hosting + Firestore on push to main.
#
# Two jobs so Hosting still succeeds if Firestore deploy fails (e.g. IAM).
#
# Secret: FIREBASE_SERVICE_ACCOUNT — full JSON of a GCP service account key.
#
# IAM (Google Cloud Console → IAM → grant these to that service account principal):
#   • roles/serviceusage.serviceUsageViewer — avoids 403 on serviceusage.googleapis.com
#     ("Permission denied to get service [firestore.googleapis.com]")
#   • roles/firebaserules.admin — deploy/test Firestore security rules (firebaserules.googleapis.com)
#   • Hosting deploy via FirebaseExtended/action-hosting-deploy usually works with the default
#     firebase-adminsdk-* account; if not, add roles/firebasehosting.admin
#
# Quick fix for a solo project: Project → IAM → grant **Editor** (roles/editor) to the
# firebase-adminsdk-* email (treat the JSON like a password; prefer least-privilege above).

name: Deploy web to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy-hosting:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build web --release

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          entryPoint: .

  deploy-firestore:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Firestore rules & indexes
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s\n' "$FIREBASE_SERVICE_ACCOUNT" > "${RUNNER_TEMP}/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="${RUNNER_TEMP}/firebase-sa.json"
          export CI=true
          npm install -g firebase-tools
          firebase deploy --only firestore --non-interactive
