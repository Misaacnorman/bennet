name: bennet
description: "Bennet — Flutter bookkeeping with Firebase Auth + Cloud Firestore backend."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.10.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.5
  intl: ^0.20.2
  pdf: ^3.11.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  path: ^1.9.1
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.25.15

flutter:
  uses-material-design: true
